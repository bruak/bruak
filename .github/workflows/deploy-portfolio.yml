name: Deploy Portfolio Site

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio-site/**'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Clean up old artifacts
        run: |
          gh api "/repos/${{ github.repository }}/actions/artifacts?name=github-pages" \
            --jq '.artifacts[] | select(.expired == false) | .id' \
            | xargs -I {} gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/{}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./portfolio-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
