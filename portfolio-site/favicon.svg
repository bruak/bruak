<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#040d1e"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="96" rx="20" fill="url(#bg)"/>
  <!-- Subtle radial glow -->
  <rect width="96" height="96" rx="20" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="1.5" y="1.5" width="93" height="93" rx="18.5" fill="none" stroke="url(#border)" stroke-width="1.5"/>

  <!-- Top-left corner bracket -->
  <polyline points="8,22 8,9 21,9" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right corner bracket -->
  <polyline points="88,74 88,87 75,87" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BS monogram -->
  <text x="49" y="61" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="36" font-weight="800"
        fill="url(#txt)" letter-spacing="-2">BS</text>

  <!-- Accent line under text -->
  <line x1="29" y1="68" x2="69" y2="68" stroke="url(#txt)" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
</svg>
