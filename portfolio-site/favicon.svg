<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A202C"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DD6B20"/>
      <stop offset="100%" stop-color="#C05621"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#FBD38D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="96" rx="18" fill="url(#bg)"/>

  <!-- Glowing border -->
  <rect x="1" y="1" width="94" height="94" rx="17" fill="none"
        stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Top-left bracket -->
  <polyline points="9,21 9,9 21,9" fill="none" stroke="#DD6B20"
            stroke-width="3" stroke-opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right bracket -->
  <polyline points="87,75 87,87 75,87" fill="none" stroke="#C05621"
            stroke-width="3" stroke-opacity="0.75" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- B -->
  <text x="29" y="60" font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="900" fill="url(#txt)" letter-spacing="0">B</text>
  <!-- S — offset right, slightly dimmer for layered feel -->
  <text x="54" y="60" font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="900" fill="url(#accent)" fill-opacity="0.85" letter-spacing="0">S</text>
</svg>
