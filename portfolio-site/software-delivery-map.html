<!-- ── animations.jsx (no PlaybackBar) ─────────────────────────── -->
<script type="text/babel">
const Easing = {
  linear: t => t,
  easeInQuad: t => t*t,
  easeOutQuad: t => t*(2-t),
  easeInOutQuad: t => t<.5?2*t*t:-1+(4-2*t)*t,
  easeInCubic: t => t*t*t,
  easeOutCubic: t => (--t)*t*t+1,
  easeInOutCubic: t => t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1,
  easeOutExpo: t => t===1?1:1-Math.pow(2,-10*t),
  easeOutBack: t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
};

const clamp = (v,min,max) => Math.max(min,Math.min(max,v));

function interpolate(input,output,ease=Easing.linear) {
  return t => {
    if (t<=input[0]) return output[0];
    if (t>=input[input.length-1]) return output[output.length-1];
    for (let i=0;i<input.length-1;i++) {
      if (t>=input[i]&&t<=input[i+1]) {
        const span=input[i+1]-input[i];
        const local=span===0?0:(t-input[i])/span;
        const easeFn=Array.isArray(ease)?(ease[i]||Easing.linear):ease;
        return output[i]+(output[i+1]-output[i])*easeFn(local);
      }
    }
    return output[output.length-1];
  };
}

function animate({from=0,to=1,start=0,end=1,ease=Easing.easeInOutCubic}={}) {
  return t => {
    if (t<=start) return from;
    if (t>=end) return to;
    return from+(to-from)*ease((t-start)/(end-start));
  };
}

const TimelineContext = React.createContext({time:0,duration:28,playing:true});
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({localTime:0,progress:0,duration:0});
const useSprite = () => React.useContext(SpriteContext);

function Sprite({start=0,end=Infinity,children,keepMounted=false}) {
  const {time} = useTimeline();
  const visible = time>=start && time<=end;
  if (!visible && !keepMounted) return null;
  const duration = end-start;
  const localTime = Math.max(0,time-start);
  const progress = duration>0&&isFinite(duration)?clamp(localTime/duration,0,1):0;
  const value = {localTime,progress,duration,visible};
  return (
    <SpriteContext.Provider value={value}>
      {typeof children==='function'?children(value):children}
    </SpriteContext.Provider>
  );
}

// Minimal Stage — no playback bar, no controls, pure loop
function Stage({width=1920,height=1080,duration=28,background='#1A202C',loop=true,holdEnd=2.5,children}) {
  const [time, setTime] = React.useState(0);
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);
  const holdRef = React.useRef(0);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const s = Math.min(el.clientWidth/width, el.clientHeight/height);
      setScale(Math.max(0.05,s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize',measure);
    return () => { ro.disconnect(); window.removeEventListener('resize',measure); };
  }, [width,height]);

  React.useEffect(() => {
    const step = ts => {
      if (lastTsRef.current==null) lastTsRef.current=ts;
      const dt=(ts-lastTsRef.current)/1000;
      lastTsRef.current=ts;
      setTime(t => {
        let next=t+dt;
        if (next>=duration) {
          if (!loop) return duration;
          holdRef.current+=dt;
          if (holdRef.current<holdEnd) return duration;
          holdRef.current=0;
          return next%duration;
        }
        return next;
      });
      rafRef.current=requestAnimationFrame(step);
    };
    rafRef.current=requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [duration,loop,holdEnd]);

  const ctxValue = React.useMemo(
    () => ({time,duration,playing:true,setTime,setPlaying:()=>{}}),
    [time,duration]
  );

  return (
    <div ref={stageRef} style={{
      position:'absolute',inset:0,
      display:'flex',alignItems:'center',justifyContent:'center',
      background:'#1A202C',overflow:'hidden',
    }}>
      <div style={{
        width,height,background,position:'relative',
        transform:`scale(${scale})`,transformOrigin:'center',
        flexShrink:0,overflow:'hidden',
      }}>
        <TimelineContext.Provider value={ctxValue}>
          {children}
        </TimelineContext.Provider>
      </div>
    </div>
  );
}

Object.assign(window,{Easing,interpolate,animate,clamp,TimelineContext,useTime,useTimeline,Sprite,SpriteContext,useSprite,Stage});
</script>

<!-- ── elements.jsx ────────────────────────────────────────────── -->
<script type="text/babel">
const PANEL_BG = 'rgba(45,55,72,0.55)';
const PANEL_BG_2 = 'rgba(26,32,44,0.7)';
const PANEL_STROKE = 'rgba(221,107,32,0.18)';
const TEXT_DIM = 'rgba(160,172,192,0.6)';
const TEXT_BRIGHT = 'rgba(247,250,252,0.92)';
const MONO = 'JetBrains Mono,ui-monospace,SFMono-Regular,monospace';
const SANS = 'Inter,system-ui,-apple-system,sans-serif';

const PALETTES = {
  cyber:  {CYAN:'oklch(75% 0.15 55)',GREEN:'oklch(72% 0.18 45)',GLOW1:'rgba(120,60,30,0.35)',GLOW2:'rgba(100,50,20,0.25)',GRID:'rgba(221,107,32,0.04)',GRID_FINE:'rgba(221,107,32,0.025)'},
  aurora: {CYAN:'oklch(78% 0.18 295)',GREEN:'oklch(78% 0.20 335)',GLOW1:'rgba(80,50,130,0.38)',GLOW2:'rgba(130,40,100,0.28)',GRID:'rgba(200,160,230,0.045)',GRID_FINE:'rgba(200,160,230,0.025)'},
  ember:  {CYAN:'oklch(82% 0.15 70)', GREEN:'oklch(72% 0.20 25)', GLOW1:'rgba(120,70,30,0.35)',GLOW2:'rgba(110,40,30,0.28)',GRID:'rgba(230,180,130,0.04)',GRID_FINE:'rgba(230,180,130,0.025)'},
};
const ENERGIES = {
  calm:    {packetMul:0.55,glowMul:0.7,pulseMul:0.6,logMul:0.7,barLive:0.5},
  steady:  {packetMul:1.0, glowMul:1.0,pulseMul:1.0,logMul:1.0,barLive:1.0},
  intense: {packetMul:1.8, glowMul:1.4,pulseMul:1.7,logMul:1.5,barLive:1.6},
};
const CAMERAS = {
  static:    {zoom:0,    drift:0 },
  cinematic: {zoom:0.012,drift:4 },
  dramatic:  {zoom:0.04, drift:12},
};

const TweaksContext = React.createContext({...PALETTES.cyber,...ENERGIES.steady,...CAMERAS.cinematic});
const useT = () => React.useContext(TweaksContext);

function resolveAccent(theme,key) {
  if (!key) return theme.CYAN;
  if (typeof key!=='string') return key;
  return key.toLowerCase()==='green'?theme.GREEN:theme.CYAN;
}

function BackgroundGrid() {
  const t = useTime();
  const {GLOW1,GLOW2,GRID,GRID_FINE} = useT();
  const pulse = 0.7+0.05*Math.sin(t*0.6);
  return (
    <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse at 20% 30%,${GLOW1},transparent 55%),radial-gradient(ellipse at 85% 80%,${GLOW2},transparent 50%),linear-gradient(180deg,#1A202C 0%,#1A202C 50%,#1A202C 100%)`}}>
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(${GRID} 1px,transparent 1px),linear-gradient(90deg,${GRID} 1px,transparent 1px)`,backgroundSize:'60px 60px',opacity:pulse,maskImage:'radial-gradient(ellipse at center,#000 30%,transparent 85%)'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(${GRID_FINE} 1px,transparent 1px),linear-gradient(90deg,${GRID_FINE} 1px,transparent 1px)`,backgroundSize:'15px 15px',opacity:0.5}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.55) 100%)'}}/>
    </div>
  );
}

function SourceNode({x,y,label,sublabel,kind,accentKey,glowAt=0}) {
  const t = useTime();
  const theme = useT();
  const accent = resolveAccent(theme,accentKey);
  const cycle = 2.5/theme.pulseMul;
  const phase = ((t-glowAt)%cycle+cycle)%cycle;
  const pulse = phase<0.5?(1-phase/0.5):0;
  return (
    <div style={{position:'absolute',left:x,top:y,width:230,height:78,borderRadius:14,background:PANEL_BG,backdropFilter:'blur(8px)',border:`1px solid ${PANEL_STROKE}`,boxShadow:`inset 0 1px 0 rgba(255,255,255,0.04),0 0 ${20+pulse*30*theme.glowMul}px ${accent}`,display:'flex',alignItems:'center',gap:14,padding:'0 16px'}}>
      <div style={{position:'absolute',left:0,top:12,bottom:12,width:3,background:accent,borderRadius:2,boxShadow:`0 0 ${8+pulse*16}px ${accent}`,opacity:0.7+pulse*0.3}}/>
      <SourceIcon kind={kind} accent={accent} pulse={pulse}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:SANS,fontWeight:600,fontSize:14,color:TEXT_BRIGHT,letterSpacing:'0.02em'}}>{label}</div>
        <div style={{fontFamily:MONO,fontSize:10,color:TEXT_DIM,letterSpacing:'0.12em',textTransform:'uppercase',marginTop:3}}>{sublabel}</div>
      </div>
      <div style={{width:8,height:8,borderRadius:4,background:accent,boxShadow:`0 0 ${4+pulse*12}px ${accent}`,opacity:0.5+pulse*0.5}}/>
    </div>
  );
}

function SourceIcon({kind,accent,pulse}) {
  const sw=1.6;
  let path=null;
  if (kind==='iot') path=<g><circle cx="14" cy="20" r="2.5" fill={accent}/><path d="M9 16c1.5-2 3.5-3 5-3s3.5 1 5 3" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round"/><path d="M5 12c2.5-3.5 6-5 9-5s6.5 1.5 9 5" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round"/><path d="M1 8c4-5 8-7 13-7s9 2 13 7" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round" opacity="0.6"/></g>;
  else if (kind==='api') path=<g><path d="M9 6L4 14l5 8" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M19 6l5 8-5 8" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M16 5l-4 18" stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round"/></g>;
  else if (kind==='db') path=<g><ellipse cx="14" cy="6" rx="9" ry="3" stroke={accent} strokeWidth={sw} fill="none"/><path d="M5 6v8c0 1.6 4 3 9 3s9-1.4 9-3V6" stroke={accent} strokeWidth={sw} fill="none"/><path d="M5 14v8c0 1.6 4 3 9 3s9-1.4 9-3v-8" stroke={accent} strokeWidth={sw} fill="none"/></g>;
  else if (kind==='mobile') path=<g><rect x="7" y="2" width="14" height="24" rx="2.5" stroke={accent} strokeWidth={sw} fill="none"/><line x1="12" y1="22" x2="16" y2="22" stroke={accent} strokeWidth={sw} strokeLinecap="round"/><line x1="10" y1="6" x2="18" y2="6" stroke={accent} strokeWidth={sw} opacity="0.5"/></g>;
  else if (kind==='camera') path=<g><rect x="2" y="7" width="20" height="15" rx="2" stroke={accent} strokeWidth={sw} fill="none"/><path d="M22 11l4-2v12l-4-2" stroke={accent} strokeWidth={sw} fill="none" strokeLinejoin="round"/><circle cx="9" cy="14.5" r="3" stroke={accent} strokeWidth={sw} fill="none"/></g>;
  else if (kind==='machine') path=<g><rect x="3" y="10" width="22" height="14" rx="1.5" stroke={accent} strokeWidth={sw} fill="none"/><circle cx="9" cy="17" r="2.5" stroke={accent} strokeWidth={sw} fill="none"/><circle cx="19" cy="17" r="2.5" stroke={accent} strokeWidth={sw} fill="none"/><path d="M11 10V6h6v4" stroke={accent} strokeWidth={sw} fill="none"/><circle cx="14" cy="4" r="1.2" fill={accent}/></g>;
  return (
    <div style={{width:36,height:36,borderRadius:8,background:'rgba(26,32,44,0.7)',border:`1px solid ${PANEL_STROKE}`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`inset 0 0 ${6+pulse*12}px ${accent}`}}>
      <svg width="28" height="28" viewBox="0 0 28 28">{path}</svg>
    </div>
  );
}

function PipelineCard({x,y,w,h,index,label,activeAt}) {
  const t = useTime();
  const theme = useT();
  const {CYAN,GREEN,glowMul,pulseMul} = theme;
  const cycleDur=14/pulseMul;
  const cyclePhase=((t-activeAt)%cycleDur+cycleDur)%cycleDur;
  const bright=cyclePhase<1.4?Math.max(0,1-cyclePhase/1.4):0;
  const firstActivated=t>=activeAt;
  const baseGlow=firstActivated?0.55:0.12;
  const glow=baseGlow+bright*0.45;
  const accent=index<3?CYAN:GREEN;
  return (
    <div style={{position:'absolute',left:x,top:y,width:w,height:h,borderRadius:14,background:PANEL_BG_2,backdropFilter:'blur(10px)',border:`1px solid ${PANEL_STROKE}`,boxShadow:`0 0 ${20+glow*60*glowMul}px ${accent},inset 0 1px 0 rgba(255,255,255,0.04)`,overflow:'hidden'}}>
      <div style={{position:'absolute',left:0,right:0,top:0,height:3,background:accent,opacity:glow,boxShadow:`0 0 ${10+bright*20}px ${accent}`}}/>
      <div style={{position:'absolute',left:12,top:12,fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.2em'}}>L{String(index+1).padStart(2,'0')}</div>
      <div style={{position:'absolute',right:10,top:13,display:'flex',alignItems:'center',gap:5}}>
        <div style={{width:5,height:5,borderRadius:3,background:accent,opacity:0.5+glow*0.5,boxShadow:`0 0 ${4+bright*12}px ${accent}`}}/>
        <div style={{fontFamily:MONO,fontSize:8,color:firstActivated?accent:TEXT_DIM,letterSpacing:'0.1em',opacity:0.6+glow*0.4}}>{firstActivated?'LIVE':'IDLE'}</div>
      </div>
      <div style={{position:'absolute',left:10,right:10,top:36,fontFamily:SANS,fontWeight:700,fontSize:12,color:TEXT_BRIGHT,letterSpacing:'0.04em',textTransform:'uppercase',lineHeight:1.18,whiteSpace:'pre-line'}}>{label}</div>
      <div style={{position:'absolute',left:12,right:12,bottom:14,height:26,borderRadius:4,background:'rgba(26,32,44,0.6)',border:`1px solid ${PANEL_STROKE}`,overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,bottom:0,width:30,left:`${((t*60*pulseMul+index*30)%130)-30}%`,background:`linear-gradient(90deg,transparent,${accent},transparent)`,opacity:0.55+glow*0.45,filter:'blur(0.4px)'}}/>
      </div>
    </div>
  );
}

function ConnectionLine({d,accent,opacity=0.25,dash=false,width=1.2}) {
  return <path d={d} stroke={accent||'oklch(82% 0.13 200)'} strokeWidth={width} fill="none" opacity={opacity} strokeLinecap="round" strokeDasharray={dash?'3 6':undefined}/>;
}

function Packet({path,t,accent,size=7}) {
  if (t<0||t>1) return null;
  let lens=[],total=0;
  for (let i=0;i<path.length-1;i++) {
    const dx=path[i+1].x-path[i].x,dy=path[i+1].y-path[i].y;
    const l=Math.sqrt(dx*dx+dy*dy);
    lens.push(l);total+=l;
  }
  let target=t*total,pos=path[0];
  for (let i=0;i<lens.length;i++) {
    if (target<=lens[i]) {
      const f=lens[i]===0?0:target/lens[i];
      pos={x:path[i].x+(path[i+1].x-path[i].x)*f,y:path[i].y+(path[i+1].y-path[i].y)*f};
      break;
    }
    target-=lens[i];pos=path[i+1];
  }
  const fade=t<0.06?t/0.06:t>0.94?(1-t)/0.06:1;
  return <div style={{position:'absolute',left:pos.x-size,top:pos.y-size,width:size*2,height:size*2,borderRadius:'50%',background:accent,boxShadow:`0 0 ${size*2}px ${accent},0 0 ${size*4}px ${accent}`,opacity:fade,pointerEvents:'none'}}/>;
}

function BackendNode({x,y,w=110,h=50,label,sub,accentKey,runningFrom=0}) {
  const t=useTime();
  const theme=useT();
  const accent=resolveAccent(theme,accentKey);
  const running=t>=runningFrom;
  const blink=(t*1.6*theme.pulseMul+x*0.01)%2;
  const dot=running?(blink<0.4?1:0.55):0.25;
  return (
    <div style={{position:'absolute',left:x,top:y,width:w,height:h,borderRadius:8,background:'rgba(45,55,72,0.75)',border:`1px solid ${PANEL_STROKE}`,boxShadow:running?`0 0 ${14*theme.glowMul}px ${accent}33,inset 0 1px 0 rgba(255,255,255,0.04)`:`inset 0 1px 0 rgba(255,255,255,0.02)`,padding:'8px 10px',display:'flex',flexDirection:'column',justifyContent:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:SANS,fontWeight:600,fontSize:11,color:TEXT_BRIGHT,letterSpacing:'0.02em'}}>
        <div style={{width:5,height:5,borderRadius:3,background:accent,opacity:dot,boxShadow:`0 0 6px ${accent}`}}/>
        {label}
      </div>
      <div style={{fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.14em',textTransform:'uppercase',marginTop:3}}>{sub}</div>
    </div>
  );
}

window.SDM={PANEL_BG,PANEL_BG_2,PANEL_STROKE,TEXT_DIM,TEXT_BRIGHT,MONO,SANS,PALETTES,ENERGIES,CAMERAS,TweaksContext,useT,resolveAccent,BackgroundGrid,SourceNode,PipelineCard,ConnectionLine,Packet,BackendNode};
</script>

<!-- ── dashboard.jsx ────────────────────────────────────────────── -->
<script type="text/babel">
const {PANEL_BG:_PBG,PANEL_BG_2:_PBG2,PANEL_STROKE:_PS,TEXT_DIM:_TD,TEXT_BRIGHT:_TB,MONO:_MO,SANS:_SA,useT:_useT} = window.SDM;

function Dashboard({x,y,w,h,appearAt}) {
  const t=useTime();
  const theme=_useT();
  const {CYAN,GREEN}=theme;
  const local=t-appearAt;
  const reveal=clamp(local/0.9,0,1);
  const ease=Easing.easeOutCubic(reveal);
  if (reveal<=0) return null;
  const throughput=Math.floor(12480+Math.min(Math.max(0,local-0.5),6)*2018*theme.barLive+Math.sin(t*1.4)*24);
  const healthVal=Easing.easeOutCubic(clamp((local-0.7)/1.6,0,1))*99.9;
  return (
    <div style={{position:'absolute',left:x,top:y,width:w,height:h,opacity:ease,transform:`translateY(${(1-ease)*14}px)`}}>
      <div style={{position:'absolute',inset:0,borderRadius:18,background:'linear-gradient(180deg,rgba(45,55,72,0.72),rgba(26,32,44,0.78))',backdropFilter:'blur(14px)',border:`1px solid ${_PS}`,boxShadow:`0 0 ${60*theme.glowMul}px ${CYAN}33,inset 0 1px 0 rgba(255,255,255,0.06)`}}/>
      <div style={{position:'absolute',left:18,right:18,top:0,height:2,background:`linear-gradient(90deg,transparent,${CYAN},${GREEN},transparent)`,opacity:0.7}}/>
      <div style={{position:'absolute',left:22,top:18,right:22,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M2 9l3-4 3 6 3-7 3 8 2-3" stroke={CYAN} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <div style={{fontFamily:_SA,fontWeight:700,fontSize:13,color:_TB,letterSpacing:'0.16em'}}>SYSTEM METRICS</div>
        </div>
        <LiveBadge t={t} accent={GREEN}/>
      </div>
      <MetricCard x={22} y={58} w={(w-56)/2} h={104} label="THROUGHPUT" value={throughput.toLocaleString()} delta="+12%" accent={CYAN} deltaColor={GREEN}/>
      <MetricCard x={22+(w-56)/2+12} y={58} w={(w-56)/2} h={104} label="HEALTH" value={null} accent={GREEN}><HealthDonut value={healthVal} accent={GREEN}/></MetricCard>
      <ChartCard x={22} y={178} w={w-44} h={148} t={t} appearAt={appearAt+0.4} cyan={CYAN} green={GREEN} barLive={theme.barLive}/>
      <LogStream x={22} y={340} w={w-44} h={h-360} appearAt={appearAt+1.2} cyan={CYAN} green={GREEN} logMul={theme.logMul}/>
    </div>
  );
}

function LiveBadge({t,accent}) {
  const blink=(t*1.4)%2<1;
  return (
    <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:999,background:'rgba(20,50,38,0.65)',border:`1px solid ${accent}66`}}>
      <div style={{width:6,height:6,borderRadius:3,background:accent,opacity:blink?1:0.45,boxShadow:`0 0 6px ${accent}`}}/>
      <div style={{fontFamily:_MO,fontSize:9,color:accent,letterSpacing:'0.22em',fontWeight:600}}>LIVE</div>
    </div>
  );
}

function MetricCard({x,y,w,h,label,value,delta,accent,deltaColor,children}) {
  return (
    <div style={{position:'absolute',left:x,top:y,width:w,height:h,borderRadius:12,background:'rgba(45,55,72,0.7)',border:`1px solid ${_PS}`,padding:'14px 16px'}}>
      <div style={{fontFamily:_MO,fontSize:9,color:_TD,letterSpacing:'0.22em',fontWeight:600}}>{label}</div>

<script type="text/babel">
const {BackgroundGrid,SourceNode,PipelineCard,ConnectionLine,Packet,BackendNode,PALETTES,ENERGIES,CAMERAS,TweaksContext,useT,resolveAccent,PANEL_STROKE,TEXT_DIM,TEXT_BRIGHT,MONO,SANS} = window.SDM;

const TWEAK_DEFAULTS = {palette:'cyber',energy:'steady',camera:'cinematic'};

const SOURCES = [
  {y:175,label:'IoT Sensor',        sub:'mqtt · 1.2k/s',kind:'iot',    accentKey:'cyan'},
  {y:271,label:'API Service',       sub:'rest · v2',    kind:'api',    accentKey:'cyan'},
  {y:367,label:'PostgreSQL',        sub:'cdc · stream', kind:'db',     accentKey:'green'},
  {y:463,label:'Mobile Device',     sub:'sdk · iOS/AND',kind:'mobile', accentKey:'cyan'},
  {y:559,label:'Camera Feed',       sub:'rtsp · h.265', kind:'camera', accentKey:'green'},
  {y:655,label:'Industrial Machine',sub:'modbus · OPC', kind:'machine',accentKey:'green'},
];
const SRC_X=80,SRC_W=230,SRC_H=78,SRC_EXIT_X=SRC_X+SRC_W;

const PIPELINE=[
  {label:'Data &\nIntegration', activeAt:7.0},
  {label:'Service\nLayer',      activeAt:8.0},
  {label:'Real-Time\nMessaging',activeAt:9.0},
  {label:'Runtime &\nDelivery', activeAt:10.0},
  {label:'Observability',       activeAt:11.0},
];
const PIPE_X=340,PIPE_Y_BASE=210,PIPE_W=162,PIPE_H=110,PIPE_GAP=8,PIPE_STEP=PIPE_W+PIPE_GAP;
const pipeCardPos=i=>({x:PIPE_X+i*PIPE_STEP,y:PIPE_Y_BASE+i*12});
const PIPE_EXIT_X=PIPE_X+5*PIPE_STEP-PIPE_GAP;
const JUNCTION={x:PIPE_X-6,y:270};

const BACKEND=[
  {x:350,y:470,label:'API Gateway',   sub:'kong · jwt',    accentKey:'cyan', runAt:8.0},
  {x:530,y:470,label:'Worker Service',sub:'queue · async', accentKey:'cyan', runAt:8.4},
  {x:710,y:470,label:'WebSocket Hub', sub:'ws · 420 cx',   accentKey:'cyan', runAt:9.0},
  {x:890,y:470,label:'MQTT Broker',   sub:'qos1 · 1.2k/s', accentKey:'cyan', runAt:9.2},
  {x:350,y:542,label:'Redis',         sub:'cache · pubsub',accentKey:'green',runAt:9.6},
  {x:530,y:542,label:'PostgreSQL',    sub:'wal · replica', accentKey:'green',runAt:9.8},
  {x:710,y:542,label:'Docker',        sub:'12 containers', accentKey:'green',runAt:10.2},
  {x:890,y:542,label:'Health Probe',  sub:'liveness · ok', accentKey:'green',runAt:11.0},
];

function sourceToPipelinePath(srcIdx) {
  const s=SOURCES[srcIdx],sy=s.y+SRC_H/2;
  return [{x:SRC_EXIT_X,y:sy},{x:SRC_EXIT_X+14,y:sy},{x:JUNCTION.x-12,y:sy},{x:JUNCTION.x-12,y:JUNCTION.y},{x:JUNCTION.x+10,y:JUNCTION.y}];
}
function pipelineToDashboardPath() {
  const pts=[{x:JUNCTION.x+10,y:JUNCTION.y}];
  for (let i=0;i<5;i++) {
    const p=pipeCardPos(i);
    pts.push({x:p.x+18,y:p.y+PIPE_H/2},{x:p.x+PIPE_W-18,y:p.y+PIPE_H/2});
  }
  pts.push({x:PIPE_EXIT_X+30,y:pipeCardPos(4).y+PIPE_H/2},{x:PIPE_EXIT_X+30,y:200},{x:1240,y:200});
  return pts;
}
function returnPath() {
  return [{x:1240,y:620},{x:1186,y:700},{x:950,y:760},{x:600,y:800},{x:320,y:760},{x:240,y:700},{x:200,y:500},{x:200,y:365+SRC_H/2},{x:SRC_X+SRC_W-10,y:365+SRC_H/2}];
}

function ConnectionWires() {
  const theme=useT();
  const {CYAN,GREEN}=theme;
  const sourceWires=SOURCES.map(s=>{const sy=s.y+SRC_H/2;return `M ${SRC_EXIT_X} ${sy} L ${SRC_EXIT_X+14} ${sy} L ${JUNCTION.x-12} ${sy} L ${JUNCTION.x-12} ${JUNCTION.y} L ${JUNCTION.x+10} ${JUNCTION.y}`;});
  const pipeWires=[];
  for (let i=0;i<5;i++) {
    const p=pipeCardPos(i);const cy=p.y+PIPE_H/2;
    if (i===0) pipeWires.push(`M ${JUNCTION.x+10} ${JUNCTION.y} L ${p.x+18} ${cy}`);
    else {const prev=pipeCardPos(i-1);pipeWires.push(`M ${prev.x+PIPE_W-18} ${prev.y+PIPE_H/2} L ${p.x+18} ${cy}`);}
  }
  const last=pipeCardPos(4),lastCy=last.y+PIPE_H/2;
  const tailWire=`M ${last.x+PIPE_W-18} ${lastCy} L ${PIPE_EXIT_X+30} ${lastCy} L ${PIPE_EXIT_X+30} 200 L 1240 200`;
  const backendWires=BACKEND.map(b=>{const card=pipeCardPos(Math.min(4,Math.floor((b.x-PIPE_X)/PIPE_STEP)));const tx=card.x+PIPE_W/2,ty=card.y+PIPE_H,cx=b.x+70,cy=b.y;return `M ${tx} ${ty} L ${tx} ${(ty+cy)/2} L ${cx} ${(ty+cy)/2} L ${cx} ${cy}`;});
  const ret=returnPath();
  const retD=ret.reduce((acc,p,i)=>acc+(i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`),'');
  return (
    <svg style={{position:'absolute',inset:0,pointerEvents:'none'}} width="1920" height="1080" viewBox="0 0 1920 1080">
      <defs><linearGradient id="wireGrad" x1="0" x2="1"><stop offset="0%" stopColor={CYAN} stopOpacity="0.05"/><stop offset="50%" stopColor={CYAN} stopOpacity="0.35"/><stop offset="100%" stopColor={GREEN} stopOpacity="0.35"/></linearGradient></defs>
      {sourceWires.map((d,i)=><ConnectionLine key={'sw'+i} d={d} accent={resolveAccent(theme,SOURCES[i].accentKey)} opacity={0.32} width={1.4}/>)}
      {pipeWires.map((d,i)=><ConnectionLine key={'pw'+i} d={d} accent="url(#wireGrad)" opacity={0.6} width={1.6}/>)}
      <ConnectionLine d={tailWire} accent={GREEN} opacity={0.4} width={1.6}/>
      {backendWires.map((d,i)=><ConnectionLine key={'bw'+i} d={d} accent={resolveAccent(theme,BACKEND[i].accentKey)} opacity={0.18} width={1} dash/>)}
      <ReturnWire d={retD} accent={GREEN}/>
    </svg>
  );
}

function ReturnWire({d,accent}) {
  const t=useTime();
  const op=clamp((t-25.0)/0.6,0,1)*(1-clamp((t-27.7)/0.3,0,1));
  if (op<=0.01) return null;
  return <path d={d} stroke={accent} strokeWidth="1.2" fill="none" strokeDasharray="2 8" opacity={op*0.55} strokeLinecap="round"/>;
}

function PacketStream() {
  const t=useTime();const theme=useT();const {CYAN,GREEN,packetMul}=theme;const packets=[];
  SOURCES.forEach((s,srcIdx)=>{
    const srcAppear=3.0+srcIdx*0.35,emitStart=srcAppear+1.2;
    if (t<emitStart) return;
    const path=[...sourceToPipelinePath(srcIdx),...pipelineToDashboardPath().slice(1)];
    const lifetime=6.5/Math.max(0.6,packetMul),period=1.4/packetMul;
    const accent=resolveAccent(theme,s.accentKey);
    const slots=Math.min(8,Math.ceil(5*packetMul));
    for (let n=0;n<slots;n++) {
      const launchedAt=emitStart+n*period+srcIdx*0.18,age=t-launchedAt;
      if (age<0||age>lifetime) continue;
      packets.push(<Packet key={'p'+srcIdx+'-'+n} path={path} t={age/lifetime} accent={accent} size={age/lifetime<0.18?5:6}/>);
    }
  });
  if (t>12) {
    const trunk=pipelineToDashboardPath(),n=Math.round(8*packetMul);
    for (let i=0;i<n;i++) {
      const phase=((t/(4.0/packetMul))+i/n)%1;
      packets.push(<Packet key={'a'+i} path={trunk} t={phase} accent={i%2===0?CYAN:GREEN} size={5}/>);
    }
  }
  if (t>25.0&&t<28) {
    const rp=returnPath(),count=Math.max(3,Math.round(3*packetMul));
    for (let i=0;i<count;i++) {
      const launchedAt=25.2+i*0.6/packetMul,age=t-launchedAt,lifetime=2.4/Math.max(0.7,packetMul);
      if (age<0||age>lifetime) continue;
      packets.push(<Packet key={'r'+i} path={rp} t={age/lifetime} accent={GREEN} size={6}/>);
    }
  }
  return <>{packets}</>;
}

function CameraDrift({children}) {
  const t=useTime();const {zoom,drift}=useT();
  if (zoom===0&&drift===0) return <>{children}</>;
  const z=1+zoom*Math.sin(t*0.18),px=drift*Math.sin(t*0.13),py=(drift*0.75)*Math.cos(t*0.11);
  return <div style={{position:'absolute',inset:0,transform:`scale(${z}) translate(${px}px,${py}px)`,transformOrigin:'center'}}>{children}</div>;
}

function EntryVeil() {
  const t=useTime();
  const fadeIn=1-clamp(t/1.6,0,1),fadeOut=clamp((t-27.4)/0.6,0,1),op=Math.max(fadeIn,fadeOut);
  if (op<=0.01) return null;
  return <div style={{position:'absolute',inset:0,background:'#000',opacity:op,pointerEvents:'none',zIndex:999}}/>;
}

function Sources() {
  const t=useTime();
  return SOURCES.map((s,i)=>{
    const appearAt=3.0+i*0.35,local=t-appearAt,op=clamp(local/0.55,0,1),ease=Easing.easeOutCubic(op);
    if (op<=0) return null;
    return <div key={i} style={{opacity:ease,transform:`translateX(${(1-ease)*-20}px)`,position:'absolute',left:0,top:0,width:'100%',height:'100%',pointerEvents:'none'}}><SourceNode x={SRC_X} y={s.y} label={s.label} sublabel={s.sub} kind={s.kind} accentKey={s.accentKey} glowAt={appearAt+1.2}/></div>;
  });
}

function PipelineLayers() {
  const t=useTime();
  return PIPELINE.map((p,i)=>{
    const appearAt=5.5+i*0.25,local=t-appearAt,op=clamp(local/0.55,0,1),ease=Easing.easeOutCubic(op);
    if (op<=0) return null;
    const pos=pipeCardPos(i);
    return <div key={i} style={{position:'absolute',inset:0,opacity:ease,transform:`translateY(${(1-ease)*18}px)`,pointerEvents:'none'}}><PipelineCard x={pos.x} y={pos.y} w={PIPE_W} h={PIPE_H} index={i} label={p.label} activeAt={p.activeAt}/></div>;
  });
}

function Backend() {

  return BACKEND.map((b,i)=>{
    const appearAt=b.runAt-0.6,local=t-appearAt,op=clamp(local/0.5,0,1);

  });
}

function BottomStreams() {
  const t=useTime();const {CYAN,GREEN,pulseMul}=useT();
  const op=clamp((t-10.5)/0.8,0,1);
  if (op<=0) return null;
  return (
    <div style={{position:'absolute',left:350,top:622,width:700,opacity:op,display:'flex',gap:14}}>
      <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'rgba(26,32,44,0.65)',border:`1px solid ${PANEL_STROKE}`}}>
        <div style={{fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.22em',marginBottom:8}}>DOCKER · POD CLUSTER</div>
        <div style={{display:'flex',gap:6}}>
          {Array.from({length:12}).map((_,i)=>{
            const blink=((t*1.2*pulseMul+i*0.4)%3)<0.4;
            return <div key={i} style={{width:18,height:22,borderRadius:3,background:'rgba(45,55,72,0.6)',border:`1px solid ${blink?GREEN:'rgba(221,107,32,0.18)'}`,boxShadow:blink?`0 0 10px ${GREEN}`:'none',position:'relative'}}><div style={{position:'absolute',bottom:3,left:3,right:3,height:2,borderRadius:1,background:GREEN,opacity:blink?1:0.4}}/></div>;
          })}
        </div>
      </div>
      <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'rgba(26,32,44,0.65)',border:`1px solid ${PANEL_STROKE}`,position:'relative',overflow:'hidden'}}>
        <div style={{fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.22em',marginBottom:8}}>WEBSOCKET · MQTT STREAMS</div>
        {[0,1,2].map(i=>(
          <div key={i} style={{position:'relative',height:4,marginTop:5,background:'rgba(221,107,32,0.08)',borderRadius:2,overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,bottom:0,width:'20%',left:`${((t*(60+i*30)*pulseMul+i*70)%130)-20}%`,background:`linear-gradient(90deg,transparent,${i===0?CYAN:GREEN},transparent)`,filter:'blur(0.5px)'}}/>
          </div>
        ))}
      </div>
    </div>
  );
}

function Labels() {
  const t=useTime();const {CYAN}=useT();
  return (
    <>
      {clamp((t-2.7)/0.6,0,1)>0&&<div style={{position:'absolute',left:SRC_X,top:135,fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.28em',opacity:clamp((t-2.7)/0.6,0,1)}}><span style={{color:CYAN,marginRight:8}}>▸</span>INPUT · DATA SOURCES</div>}
      {clamp((t-5.2)/0.6,0,1)>0&&<div style={{position:'absolute',left:PIPE_X,top:170,fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.28em',opacity:clamp((t-5.2)/0.6,0,1)}}><span style={{color:CYAN,marginRight:8}}>▸</span>PIPELINE · 5 LAYERS</div>}
      {clamp((t-7.5)/0.6,0,1)>0&&<div style={{position:'absolute',left:350,top:432,fontFamily:MONO,fontSize:9,color:TEXT_DIM,letterSpacing:'0.28em',opacity:clamp((t-7.5)/0.6,0,1)}}><span style={{color:CYAN,marginRight:8}}>▸</span>BACKEND · INTEGRATION</div>}
    </>
  );
}

function Scene() {
  return (
    <Sprite start={0} end={28} keepMounted>
      <BackgroundGrid/>
      <CameraDrift>
        <ConnectionWires/>
        <Labels/>
        <Sources/>
        <PipelineLayers/>
        <Backend/>
        <BottomStreams/>
        <Dashboard x={1240} y={102} w={620} h={520} appearAt={15.5}/>
        <MobileScreen x={1452} y={642} w={208} h={398} appearAt={17.0}/>
        <PacketStream/>
      </CameraDrift>
      <EntryVeil/>
    </Sprite>
  );
}

function App() {
  const themeValue = React.useMemo(() => ({...PALETTES.cyber,...ENERGIES.steady,...CAMERAS.cinematic}),[]);
  return (
    <TweaksContext.Provider value={themeValue}>
      <Stage width={1920} height={1080} duration={18} background="#1A202C">
        <Scene/>
      </Stage>
    </TweaksContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
